---
set_ac_offset:
  name: "Set AC offset"
  description: "Set the delta between the target temperature and the temperature sent to the real AC."
  target:
    entity:
      integration: virtual_thermostat
      domain: climate
  fields:
    delta_ac:
      name: "Delta AC"
      description: "Offset value in degrees. Positive for cooling boost, negative for heating."
      required: true
      selector:
        number:
          min: -20
          max: 20
          step: 0.5
          unit_of_measurement: "°C"

set_hysteresis:
  name: "Set hysteresis"
  description: "Set the hysteresis value for on/off cycling prevention."
  target:
    entity:
      integration: virtual_thermostat
      domain: climate
  fields:
    hysteresis:
      name: "Hysteresis"
      description: "Hysteresis in degrees Celsius."
      required: true
      selector:
        number:
          min: 0.1
          max: 5.0
          step: 0.1
          unit_of_measurement: "°C"
